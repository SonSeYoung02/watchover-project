spring:
  # 환경 변수 파일 불러오기
  config:
    import: optional:file:dev.env[.properties]

  # 앱 이름
  application:
    name: watchover

  # AWS 데이터베이스(환경 변수 파일 사용)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: "jdbc:mysql://${DB_URL}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul"
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  # SpringSecurity 설정
  profiles:
    active: dev