services:
  prod:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: watchover-prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    ports:
      - "${PROD_SERVER_PORT}:${PROD_SERVER_PORT}"
    networks:
      - watchover-net

  nginx:
    image: nginx:alpine
    container_name: watchover-nginx
    restart: unless-stopped
    depends_on:
      - prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - watchover-net

networks:
  watchover-net:
    driver: bridge